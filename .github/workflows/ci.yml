name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Tests ──────────────────────────────────────────────────────────────
  # Runs on GitHub's cloud (no secrets needed — mock backend only).
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest -q

  # ── 2. Deploy ─────────────────────────────────────────────────────────────
  # Runs on the self-hosted runner INSIDE the internal network (EC2).
  # Triggered only on pushes to main (not on PRs).
  deploy:
    needs: test
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Pull latest code
        run: git -C /home/rishabh/rca-claude-agent pull

      - name: Install / upgrade package
        run: /home/rishabh/rca-claude-agent/.venv/bin/pip install -e ".[live,webapp,appdb,trace]"
        working-directory: /home/rishabh/rca-claude-agent

      - name: Install / refresh webapp systemd unit
        run: |
          mkdir -p ~/.config/systemd/user
          cp /home/rishabh/rca-claude-agent/deploy/rca-webapp.service ~/.config/systemd/user/rca-webapp.service
          XDG_RUNTIME_DIR=/run/user/$(id -u) systemctl --user daemon-reload
          XDG_RUNTIME_DIR=/run/user/$(id -u) systemctl --user enable rca-webapp

      # NOTE: the autonomous daemon (rca-daemon) is intentionally NOT restarted.
      # We've moved to human-in-the-loop review via the webapp; the daemon should
      # be stopped + disabled on EC2 so it no longer auto-posts to Jira.
      - name: Restart webapp
        run: XDG_RUNTIME_DIR=/run/user/$(id -u) systemctl --user restart rca-webapp
