<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MI Agent Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         background: #f4f5f7; color: #172b4d; height: 100vh; display: flex;
         flex-direction: column; }

  /* Top bar */
  .topbar { background: #0052cc; color: #fff; padding: 12px 24px;
            display: flex; align-items: center; justify-content: space-between; }
  .topbar h1 { font-size: 18px; font-weight: 600; }
  .topbar .score { font-size: 13px; opacity: .85; }

  /* Layout */
  .layout { display: flex; flex: 1; overflow: hidden; }

  /* Left panel */
  .sidebar { width: 280px; background: #fff; border-right: 1px solid #dfe1e6;
             display: flex; flex-direction: column; }
  .sidebar-header { padding: 14px 16px; border-bottom: 1px solid #dfe1e6;
                    display: flex; align-items: center; justify-content: space-between; }
  .sidebar-header span { font-size: 13px; font-weight: 600; color: #5e6c84; }
  .refresh-btn { background: #0052cc; color: #fff; border: none; border-radius: 4px;
                 padding: 6px 12px; font-size: 12px; cursor: pointer; }
  .refresh-btn:hover { background: #0065ff; }
  .filter-bar { padding: 10px 16px; border-bottom: 1px solid #dfe1e6;
                display: flex; flex-direction: column; gap: 8px; }
  .filter-bar input { width: 100%; padding: 6px 8px; border: 1px solid #dfe1e6;
                      border-radius: 4px; font-size: 13px; color: #172b4d;
                      background: #fff; box-sizing: border-box; }
  .filter-bar input:focus { outline: none; border-color: #0052cc; }
  .date-row { display: flex; gap: 8px; }
  .date-row label { flex: 1 1 0; min-width: 0; font-size: 11px; color: #5e6c84;
                    display: flex; flex-direction: column; gap: 2px; }
  .date-row input { min-width: 0; }
  .ticket-list { overflow-y: auto; flex: 1; }
  .ticket-item { padding: 12px 16px; border-bottom: 1px solid #f4f5f7; cursor: pointer;
                 transition: background .15s; }
  .ticket-item:hover { background: #f4f5f7; }
  .ticket-item.active { background: #e6efff; border-left: 3px solid #0052cc; }
  .ticket-item .key { font-size: 12px; font-weight: 600; color: #0052cc; }
  .ticket-item .summary { font-size: 13px; color: #172b4d; margin-top: 2px;
                          white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ticket-item .badge { display: inline-block; margin-top: 4px; padding: 2px 7px;
                        border-radius: 10px; font-size: 11px; font-weight: 500; }
  .badge.pending   { background: #f4f5f7; color: #5e6c84; }
  .badge.rca_ready { background: #fff0b3; color: #974f0c; }
  .badge.accepted  { background: #e3fcef; color: #006644; }
  .badge.rejected  { background: #ffebe6; color: #bf2600; }

  /* Right panel */
  .detail { flex: 1; overflow-y: auto; padding: 24px; display: flex;
            flex-direction: column; gap: 16px; }
  .empty-state { flex: 1; display: flex; align-items: center; justify-content: center;
                 color: #5e6c84; font-size: 15px; }

  .card { background: #fff; border-radius: 6px; border: 1px solid #dfe1e6; padding: 18px; }
  .card h3 { font-size: 13px; font-weight: 600; color: #5e6c84; margin-bottom: 8px;
             text-transform: uppercase; letter-spacing: .5px; }
  .card .value { font-size: 15px; color: #172b4d; line-height: 1.5; white-space: pre-wrap; }

  /* RCA panel */
  .rca-card { background: #fff; border-radius: 6px; border: 1px solid #dfe1e6; padding: 18px; }
  .rca-card h3 { font-size: 13px; font-weight: 600; color: #5e6c84; margin-bottom: 12px;
                 text-transform: uppercase; letter-spacing: .5px;
                 display: flex; align-items: center; justify-content: space-between; }
  .rca-content { font-size: 14px; line-height: 1.6; color: #172b4d; white-space: pre-wrap; }
  .rca-placeholder { color: #5e6c84; font-size: 14px; font-style: italic; }


  /* Run RCA button */
  .run-btn { background: #0052cc; color: #fff; border: none; border-radius: 4px;
             padding: 10px 20px; font-size: 14px; font-weight: 500; cursor: pointer;
             display: flex; align-items: center; gap: 8px; }
  .run-btn:hover { background: #0065ff; }
  .run-btn:disabled { background: #a5adba; cursor: not-allowed; }

  /* Actions */
  .actions { display: flex; gap: 12px; flex-wrap: wrap; }
  .accept-btn { background: #006644; color: #fff; border: none; border-radius: 4px;
                padding: 10px 24px; font-size: 14px; font-weight: 500; cursor: pointer; }
  .accept-btn:hover { background: #00875a; }
  .reject-btn { background: #fff; color: #bf2600; border: 2px solid #bf2600;
                border-radius: 4px; padding: 10px 24px; font-size: 14px;
                font-weight: 500; cursor: pointer; }
  .reject-btn:hover { background: #ffebe6; }
  .accept-btn:disabled, .reject-btn:disabled { opacity: .5; cursor: not-allowed; }

  /* Human RCA box */
  .human-rca-box { display: none; flex-direction: column; gap: 10px; }
  .human-rca-box.show { display: flex; }
  .human-rca-box textarea { width: 100%; min-height: 120px; padding: 10px;
                             border: 1px solid #dfe1e6; border-radius: 4px;
                             font-size: 14px; font-family: inherit; resize: vertical; }
  .post-human-btn { background: #bf2600; color: #fff; border: none; border-radius: 4px;
                    padding: 10px 20px; font-size: 14px; font-weight: 500; cursor: pointer;
                    align-self: flex-start; }
  .post-human-btn:hover { background: #de350b; }

  /* Scoreboard */
  .scoreboard { background: #fff; border-radius: 6px; border: 1px solid #dfe1e6;
                padding: 18px; }
  .scoreboard h3 { font-size: 13px; font-weight: 600; color: #5e6c84; margin-bottom: 14px;
                   text-transform: uppercase; letter-spacing: .5px; }
  .score-grid { display: flex; gap: 24px; flex-wrap: wrap; }
  .score-item { text-align: center; }
  .score-item .num { font-size: 28px; font-weight: 700; color: #172b4d; }
  .score-item .label { font-size: 12px; color: #5e6c84; margin-top: 2px; }
  .score-bar { margin-top: 14px; }
  .score-bar .bar-track { background: #f4f5f7; border-radius: 6px; height: 10px; }
  .score-bar .bar-fill  { background: #36b37e; border-radius: 6px; height: 10px;
                          transition: width .4s; }
  .score-bar .bar-label { font-size: 12px; color: #5e6c84; margin-top: 4px; }

  /* Attachments */
  .attachments-card { background: #fff; border-radius: 6px; border: 1px solid #dfe1e6; padding: 18px; }
  .attachments-card h3 { font-size: 13px; font-weight: 600; color: #5e6c84; margin-bottom: 12px;
                         text-transform: uppercase; letter-spacing: .5px; }
  .att-images { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 12px; }
  .att-images img { max-width: 280px; max-height: 200px; border-radius: 4px;
                    border: 1px solid #dfe1e6; cursor: pointer; object-fit: contain; }
  .att-images img:hover { border-color: #0052cc; }
  .att-pdf { margin-bottom: 10px; }
  .att-pdf summary { cursor: pointer; font-size: 13px; font-weight: 500; color: #0052cc;
                     padding: 6px 0; }
  .att-pdf pre { background: #f4f5f7; border-radius: 4px; padding: 10px; font-size: 12px;
                 white-space: pre-wrap; word-break: break-word; max-height: 300px;
                 overflow-y: auto; margin-top: 6px; }

  /* Lightbox */
  .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.8);
              z-index: 1000; align-items: center; justify-content: center; cursor: zoom-out; }
  .lightbox.show { display: flex; }
  .lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 6px; }

  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #fff;
             border-top-color: transparent; border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .toast { position: fixed; bottom: 24px; right: 24px; background: #172b4d; color: #fff;
           padding: 12px 20px; border-radius: 6px; font-size: 14px; z-index: 999;
           display: none; }
  .toast.show { display: block; }
</style>
</head>
<body>

<div class="topbar">
  <h1>MI Agent Dashboard</h1>
  <div id="tabs" style="display:flex;gap:6px;margin-left:20px;">
    <button id="tab-triage" onclick="switchTab('triage')" style="padding:6px 14px;border:none;border-radius:4px;font-size:13px;font-weight:600;cursor:pointer;">Triage</button>
    <button id="tab-dev" onclick="switchTab('dev')" style="padding:6px 14px;border:none;border-radius:4px;font-size:13px;font-weight:600;cursor:pointer;">Dev Agent</button>
    <button id="tab-quality" onclick="switchTab('quality')" style="padding:6px 14px;border:none;border-radius:4px;font-size:13px;font-weight:600;cursor:pointer;">Quality</button>
  </div>
</div>

<div class="layout">
  <!-- Left: ticket list -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span id="sidebarTitle">AUT Bugs &amp; Incidents</span>
      <button class="refresh-btn" onclick="refresh()">Refresh</button>
    </div>
    <div class="filter-bar">
      <input type="text" id="searchBox" placeholder="Search key or title..." oninput="renderTicketList()">
      <div id="triageFilters">
        <label style="display:block;font-size:11px;color:#5e6c84;margin-bottom:8px;">Work type
          <select id="workType" onchange="loadTickets()" style="width:100%;padding:6px 8px;border:1px solid #dfe1e6;border-radius:4px;font-size:12px;margin-top:2px;">
            <option value="bug_incident">Bug + Incident</option>
            <option value="all">All work types</option>
            <option value="Bug">Bug</option>
            <option value="Incident">Incident</option>
            <option value="Defect">Defect</option>
            <option value="Task">Task</option>
            <option value="Enhancement">Enhancement</option>
            <option value="New Feature">New Feature</option>
            <option value="Maintenance">Maintenance</option>
            <option value="Epic">Epic</option>
            <option value="Subtask">Subtask</option>
          </select>
        </label>
        <div class="date-row">
          <label>From<input type="date" id="fromDate" onchange="loadTickets()"></label>
          <label>To<input type="date" id="toDate" onchange="loadTickets()"></label>
        </div>
        <label style="font-size:11px;color:#5e6c84;display:flex;align-items:center;gap:6px;cursor:pointer;">
          <input type="checkbox" id="includeResolved" onchange="loadTickets()" style="width:auto;"> Include resolved (Done) tickets
        </label>
      </div>
    </div>
    <div class="ticket-list" id="ticketList">
      <div style="padding:16px;color:#5e6c84;font-size:13px;">Loading tickets...</div>
    </div>
  </div>

  <!-- Right: detail -->
  <div class="detail" id="detail">
    <div class="empty-state">Select a ticket to review</div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="lightbox" id="lightbox" onclick="this.classList.remove('show')">
  <img id="lightboxImg" src="" alt="">
</div>

<script>
let currentKey = null;
let tickets = [];
let currentTab = 'triage';   // 'triage' | 'dev'

function styleTabs() {
  for (const [id, tab] of [['tab-triage', 'triage'], ['tab-dev', 'dev'], ['tab-quality', 'quality']]) {
    const b = document.getElementById(id);
    const active = currentTab === tab;
    b.style.background = active ? '#fff' : 'rgba(255,255,255,0.2)';
    b.style.color = active ? '#0052cc' : '#fff';
  }
}

function fixBtnLabel() {
  return currentTab === 'dev' ? '⚙ Run dev agent' : '⚙ Suggest a fix (dry-run)';
}

function refresh() {
  currentTab === 'dev' ? loadRcaTickets() : loadTickets();
}

function switchTab(tab) {
  currentTab = tab;
  currentKey = null;
  styleTabs();
  const isQuality = tab === 'quality';
  // Quality is a full-width dashboard — no ticket sidebar.
  document.getElementById('sidebar').style.display = isQuality ? 'none' : '';
  if (isQuality) {
    loadQuality();
    return;
  }
  // Date/resolved filters only make sense for the Jira-synced Triage list.
  document.getElementById('triageFilters').style.display = tab === 'triage' ? '' : 'none';
  document.getElementById('sidebarTitle').textContent =
    tab === 'triage' ? 'AUT Bugs & Incidents' : 'Tickets with an RCA';
  document.getElementById('searchBox').value = '';
  document.getElementById('detail').innerHTML =
    `<div class="empty-state">Select a ticket ${tab === 'dev' ? 'to run the dev agent' : 'to review'}</div>`;
  refresh();
}

function qbar(pct, color) {
  const w = Math.max(0, Math.min(100, Math.round(pct)));
  return `<div style="height:8px;border-radius:4px;background:#f4f5f7;overflow:hidden;margin-top:4px;"><div style="height:100%;width:${w}%;background:${color};"></div></div>`;
}

async function loadQuality() {
  const el = document.getElementById('detail');
  el.innerHTML = '<div class="empty-state">Loading quality…</div>';
  try {
    const s = await (await fetch('/api/quality')).json();
    el.innerHTML = renderQuality(s);
  } catch (e) {
    el.innerHTML = '<div style="color:#bf2600;padding:16px;font-size:13px;">Failed to load quality</div>';
  }
}

function renderQuality(s) {
  const reviewed = s.reviewed || 0;
  const accPct = reviewed ? Math.round(s.accepted / reviewed * 100) : 0;
  const rejPct = reviewed ? Math.round(s.rejected / reviewed * 100) : 0;
  let h = `<div class="card"><h3>RCA quality</h3>
    <div style="font-size:13px;color:#5e6c84;margin-bottom:14px;">${s.with_rca} tickets have an RCA · ${reviewed} reviewed by a human</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;">
      <div style="background:#e3fcef;border-radius:12px;padding:14px;">
        <div style="color:#006644;font-size:13px;font-weight:600;">✓ Accepted</div>
        <div style="font-size:28px;font-weight:700;color:#006644;margin:4px 0;">${s.accepted}</div>
        ${qbar(accPct, '#006644')}<div style="font-size:12px;color:#006644;margin-top:4px;">${accPct}% of reviewed</div></div>
      <div style="background:#ffebe6;border-radius:12px;padding:14px;">
        <div style="color:#bf2600;font-size:13px;font-weight:600;">✗ Rejected</div>
        <div style="font-size:28px;font-weight:700;color:#bf2600;margin:4px 0;">${s.rejected}</div>
        ${qbar(rejPct, '#bf2600')}<div style="font-size:12px;color:#bf2600;margin-top:4px;">${rejPct}% of reviewed</div></div>
    </div></div>`;

  const vColor = {'BUG Accepted': '#bf2600', 'Not a BUG': '#006644', 'Needs review': '#974f0c'};
  const vTotal = Object.values(s.by_verdict || {}).reduce((a, b) => a + b, 0) || 1;
  let vh = '';
  ['BUG Accepted', 'Not a BUG', 'Needs review'].forEach(k => {
    const n = (s.by_verdict || {})[k] || 0;
    const pct = Math.round(n / vTotal * 100);
    vh += `<div style="margin-bottom:10px;"><div style="display:flex;justify-content:space-between;font-size:13px;color:#172b4d;"><span>${k}</span><span style="color:#5e6c84;">${n} · ${pct}%</span></div>${qbar(pct, vColor[k])}</div>`;
  });

  // Show every possible cause bucket (even at 0), so the reviewer sees the full
  // set of categories the agent can assign — not just the ones seen so far.
  const causes = s.by_cause || {};
  const order = ['code', 'data', 'infrastructure', 'third_party', 'user_side', 'ux'];
  if (causes.unknown) order.push('unknown');
  const maxC = Math.max(1, ...order.map(c => causes[c] || 0));
  let ch = '';
  order.forEach(c => {
    const n = causes[c] || 0, b = CAUSE_BUCKETS[c] || CAUSE_BUCKETS.unknown;
    ch += `<div style="margin-bottom:10px;"><div style="display:flex;justify-content:space-between;font-size:13px;color:#172b4d;"><span>${b.label}</span><span style="color:#5e6c84;">${n}</span></div>${qbar(n / maxC * 100, b.fg)}</div>`;
  });

  h += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
    <div class="card"><h3>By verdict</h3>${vh}</div>
    <div class="card"><h3>By cause bucket</h3>${ch}</div>
  </div>`;
  return h;
}

async function loadRcaTickets() {
  document.getElementById('ticketList').innerHTML =
    '<div style="padding:16px;color:#5e6c84;font-size:13px;">Loading RCA tickets...</div>';
  try {
    const res = await fetch('/api/rca_tickets');
    tickets = await res.json();
    renderTicketList();
    loadScoreboard();
  } catch (e) {
    document.getElementById('ticketList').innerHTML =
      '<div style="padding:16px;color:#bf2600;font-size:13px;">Failed to load RCA tickets</div>';
  }
}

async function loadTickets() {
  document.getElementById('ticketList').innerHTML =
    '<div style="padding:16px;color:#5e6c84;font-size:13px;">Refreshing...</div>';
  const from = document.getElementById('fromDate').value;
  const to = document.getElementById('toDate').value;
  const incl = document.getElementById('includeResolved').checked;
  const workType = document.getElementById('workType').value;
  // Remember the filters so a page refresh doesn't reset them.
  try {
    localStorage.setItem('triage.fromDate', from);
    localStorage.setItem('triage.toDate', to);
    localStorage.setItem('triage.includeResolved', incl ? 'true' : 'false');
    localStorage.setItem('triage.workType', workType);
  } catch (e) {}
  const qs = new URLSearchParams();
  if (from) qs.set('from_date', from);
  if (to) qs.set('to_date', to);
  if (incl) qs.set('include_resolved', 'true');
  if (workType) qs.set('work_type', workType);
  try {
    const res = await fetch('/api/tickets?' + qs.toString());
    tickets = await res.json();
    renderTicketList();
    loadScoreboard();
  } catch(e) {
    document.getElementById('ticketList').innerHTML =
      '<div style="padding:16px;color:#bf2600;font-size:13px;">Failed to load tickets</div>';
  }
}

function renderTicketList() {
  const el = document.getElementById('ticketList');
  const q = (document.getElementById('searchBox').value || '').trim().toLowerCase();
  const filtered = q
    ? tickets.filter(t => (t.key + ' ' + (t.title || '')).toLowerCase().includes(q))
    : tickets;
  if (!filtered.length) {
    el.innerHTML = '<div style="padding:16px;color:#5e6c84;font-size:13px;">No tickets found</div>';
    return;
  }
  el.innerHTML = filtered.map((t, i) => `
    <div class="ticket-item ${t.key === currentKey ? 'active' : ''}" onclick="selectTicket('${t.key}')">
      <div class="key">${t.key}</div>
      <div class="summary">${escHtml(t.title || '')}</div>
      <span class="badge ${t.status}">${t.status.replace('_', ' ')}</span>
      ${currentTab === 'dev' && t.bot_fix_json ? '<span style="margin-left:6px;font-size:10px;font-weight:700;color:#006644;">fix ready</span>' : ''}
    </div>
  `).join('');
}

async function selectTicket(key) {
  currentKey = key;
  renderTicketList();
  const ticket = tickets.find(t => t.key === key);
  if (!ticket) return;

  const alreadyDone = ticket.status === 'accepted' || ticket.status === 'rejected';
  const isDev = currentTab === 'dev';
  const hasRca = ticket.bot_rca_json || ticket.status === 'rca_ready';
  // Re-run is available in every state except while an investigation is in flight
  // ('running') or before the first one ('pending' has its own big Run button):
  // so rca_ready, accepted, rejected and failed can all be re-investigated.
  const canRerun = ticket.status !== 'running' && ticket.status !== 'pending';

  document.getElementById('detail').innerHTML = `
    <div class="card">
      <h3>Ticket</h3>
      <div class="value" style="font-size:18px;font-weight:600;">${escHtml(ticket.key)} — ${escHtml(ticket.title||'')}</div>
    </div>

    <div class="card">
      <h3>Description</h3>
      <div class="value">${escHtml(ticket.description || 'No description provided.')}</div>
    </div>

    <div class="rca-card" id="rcaCard">
      <h3>
        <span>${isDev ? 'Dev Agent' : 'Triage Agent RCA'}</span>
        <span style="display:flex;gap:8px;align-items:center;">
          ${!isDev && canRerun ? `<button onclick="rerunRca('${ticket.key}')" style="background:none;border:1px solid #dfe1e6;border-radius:4px;padding:3px 8px;font-size:11px;cursor:pointer;color:#5e6c84;">↺ Re-run</button>` : ''}
        </span>
      </h3>
      <div id="rcaContent">
        ${isDev ? renderFixSection(ticket) : renderRcaContent(ticket)}
      </div>
    </div>

    ${isDev ? '' : !alreadyDone ? `
    <div class="actions" id="actions">
      <button class="accept-btn" id="acceptBtn" onclick="acceptRca()" ${!hasRca ? 'disabled' : ''}>
        ✓ Accept
      </button>
      <button class="accept-btn" id="acceptPostBtn" onclick="acceptAndPostRca()" ${!hasRca ? 'disabled' : ''} style="background:#006644;">
        ✓ Accept &amp; Post to Jira
      </button>
      <button class="reject-btn" id="rejectBtn" onclick="showHumanRca()" ${!hasRca ? 'disabled' : ''}>
        ✗ Reject
      </button>
    </div>

    <div class="human-rca-box" id="humanRcaBox">
      <div class="card" style="margin:0;">
        <h3>Your RCA</h3>
        <textarea id="humanRcaText" placeholder="Describe the root cause in your own words..."></textarea>
        <div style="margin-top:10px;">
          <button class="post-human-btn" onclick="postHumanRca()">Post Human RCA to Jira</button>
        </div>
      </div>
    </div>
    ` : `
    <div class="card" style="border-color:${ticket.status==='accepted'?'#36b37e':'#ff5630'}">
      <h3>${ticket.status === 'accepted' ? '✓ Accepted' : '✗ Rejected — Human RCA posted'}</h3>
      ${ticket.human_rca ? `<div class="value">${escHtml(ticket.human_rca)}</div>` : ''}
    </div>
    `}
  `;

  loadScoreboard();
  setTimeout(() => loadAttachments(key), 50);
}

async function loadAttachments(key) {
  try {
    const res = await fetch(`/api/tickets/${key}/attachments`);
    if (!res.ok) return;
    const data = await res.json();
    const images = data.images || [];
    const pdfs = data.pdfs || [];
    if (!images.length && !pdfs.length) return;

    const card = document.createElement('div');
    card.className = 'attachments-card';
    card.innerHTML = `<h3>Attachments (${images.length + pdfs.length})</h3>
      ${images.length ? `<div class="att-images">${images.map(img =>
        `<img src="data:${img.mimeType};base64,${img.content}"
              alt="${escHtml(img.filename)}"
              title="${escHtml(img.filename)}"
              onclick="openLightbox(this.src)">`
      ).join('')}</div>` : ''}
      ${pdfs.map(pdf => `
        <details class="att-pdf">
          <summary>📄 ${escHtml(pdf.filename)}</summary>
          <pre>${escHtml(pdf.text)}</pre>
        </details>`).join('')}`;

    const detail = document.getElementById('detail');
    const rcaCard = detail.querySelector('.rca-card');
    if (rcaCard) rcaCard.before(card);
    else detail.appendChild(card);
  } catch(e) {}
}

function openLightbox(src) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('show');
}

const CAUSE_BUCKETS = {
  code:           {label: 'Code',           bg: '#ffebe6', fg: '#bf2600'},
  data:           {label: 'Data',           bg: '#fffae6', fg: '#974f0c'},
  infrastructure: {label: 'Infrastructure', bg: '#deebff', fg: '#0747a6'},
  third_party:    {label: 'Third-party',    bg: '#eae6ff', fg: '#403294'},
  user_side:      {label: 'User-side',      bg: '#fff0f6', fg: '#943d73'},
  ux:             {label: 'UX',             bg: '#e3fcef', fg: '#006644'},
  unknown:        {label: 'Unknown',        bg: '#f4f5f7', fg: '#5e6c84'},
};

function causeBadges(v) {
  // Prefer the list; fall back to the legacy single value for old stored verdicts.
  let cats = Array.isArray(v.cause_categories) ? v.cause_categories
           : (v.cause_category ? [v.cause_category] : ['unknown']);
  if (!cats.length) cats = ['unknown'];
  const chips = cats.map(c => {
    const b = CAUSE_BUCKETS[c] || CAUSE_BUCKETS.unknown;
    return `<span style="display:inline-block;padding:2px 10px;border-radius:3px;
      font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.04em;
      background:${b.bg};color:${b.fg};">${b.label}</span>`;
  }).join('');
  return `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;">${chips}</div>`;
}

// The simple QA call — MUST match schema.py verdict_label() exactly.
// our code/data/infra -> BUG Accepted; customer/vendor -> Not a BUG;
// thin evidence (low confidence / insufficient) -> Needs review.
function verdictLabel(v) {
  const conf = (v.confidence || '').toLowerCase();
  const triage = (v.triage || '').toLowerCase();
  if (triage === 'insufficient_evidence' || conf === 'low') return 'Needs review';
  let cats = Array.isArray(v.cause_categories) ? v.cause_categories
           : (v.cause_category ? [v.cause_category] : []);
  const has = list => list.some(c => cats.includes(c));
  if (has(['code', 'data', 'infrastructure'])) return 'BUG Accepted';
  if (has(['user_side', 'third_party', 'ux'])) return 'Not a BUG';
  return 'Needs review';
}

const VERDICT_COLORS = {
  'BUG Accepted': {bg: '#ffebe6', fg: '#bf2600'},   // red — it's our bug
  'Not a BUG':    {bg: '#e3fcef', fg: '#006644'},   // green — not our problem
  'Needs review': {bg: '#fffae6', fg: '#974f0c'},   // amber — a human must decide
};

// ---- Fix Suggester (Phase 1, dry-run — nothing is pushed) ----
async function suggestFix(key) {
  const btn = document.getElementById('fixBtn');
  const out = document.getElementById('fixResult');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Generating fix…';
  out.innerHTML = '';
  try {
    const r = await fetch(`/api/tickets/${key}/suggest_fix`, {method: 'POST'});
    const d = await r.json();
    out.innerHTML = r.ok ? renderFix(d, key)
      : `<div style="color:#bf2600;font-size:13px;">${escHtml(d.detail || 'Fix generation failed')}</div>`;
    // Cache on the in-memory ticket so re-selecting it this session keeps the fix;
    // the server also persisted it, so a full refresh reloads it from the DB too.
    if (r.ok) {
      const idx = tickets.findIndex(t => t.key === key);
      if (idx !== -1) tickets[idx].bot_fix_json = JSON.stringify(d);
    }
  } catch (e) {
    out.innerHTML = `<div style="color:#bf2600;font-size:13px;">${escHtml(String(e))}</div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = fixBtnLabel();
  }
}

function syntaxBadge(v) {
  const b = v === true ? {t: 'syntax OK', bg: '#e3fcef', fg: '#006644'}
    : v === false ? {t: 'syntax ERROR', bg: '#ffebe6', fg: '#bf2600'}
    : {t: 'syntax not checked', bg: '#f4f5f7', fg: '#5e6c84'};
  return `<span style="display:inline-block;padding:1px 8px;border-radius:3px;font-size:11px;font-weight:700;background:${b.bg};color:${b.fg};">${b.t}</span>`;
}

function renderFix(d, key) {
  let h = '';
  if (d.caveats && d.caveats.length) {
    h += `<div style="background:#fffae6;border:1px solid #ffe380;padding:8px 10px;border-radius:4px;font-size:12px;margin-bottom:8px;">`
       + d.caveats.map(c => '⚠ ' + escHtml(c)).join('<br>') + `</div>`;
  }
  if (!d.fixable) {
    return h + `<div style="font-size:13px;color:#5e6c84;"><strong>No fix suggested.</strong> ${escHtml(d.reason || '')}</div>`;
  }
  const files = d.files || [];
  h += `<p style="font-size:13px;margin-bottom:4px;"><strong>Proposed fix</strong> — ${files.length} file${files.length === 1 ? '' : 's'}</p>`;
  if (d.rationale) h += `<p style="font-size:13px;color:#42526e;margin-bottom:8px;">${escHtml(d.rationale)}</p>`;
  for (const f of files) {
    const header = `${f.project ? `<span style="color:#5e6c84;">${escHtml(f.project)}</span> · ` : ''}<strong>${escHtml(f.file)}</strong> ${syntaxBadge(f.syntax_ok)}`;
    const refused = (f.edits || []).filter(e => !e.applied)
      .map(e => `<div style="font-size:12px;color:#bf2600;margin:4px 0;">✗ a snippet was not applied: ${escHtml(e.error)}</div>`).join('');
    // Each file's diff is collapsible — collapsed by default when there's a diff to hide.
    h += `<details style="margin:8px 0;">
      <summary style="cursor:pointer;font-size:13px;">${header}</summary>
      ${refused}
      ${f.diff ? `<pre style="background:#f7f8fa;border:1px solid #e1e4e8;border-radius:4px;padding:10px;overflow-x:auto;font-size:12px;line-height:1.4;margin-top:6px;">${escHtml(f.diff)}</pre>` : ''}
      <div style="font-size:11px;color:#8993a4;">${escHtml(f.syntax_note || '')}</div>
    </details>`;
  }
  // Phase 1b — raise a DRAFT MR (only when something applied cleanly). If it's
  // already been raised, show the link(s); otherwise offer Raise MR + Reject.
  const anyApplied = files.some(f => (f.edits || []).some(e => e.applied));
  if (d.mr && d.mr.results) {
    h += `<div style="margin-top:10px;font-size:13px;">` + d.mr.results.map(r => r.mr_url
      ? `✅ <a href="${escHtml(r.mr_url)}" target="_blank" style="color:#0052cc;">Draft MR opened — ${escHtml(r.project)}</a>`
      : `⚠ ${escHtml(r.project)}: ${escHtml(r.error || 'not raised')}`).join('<br>') + `</div>`;
  } else {
    let btns = '';
    if (anyApplied) {
      btns += `<button id="mrBtn" onclick="raiseMr('${key}')" style="background:#0052cc;color:#fff;border:none;padding:6px 14px;border-radius:4px;font-size:13px;font-weight:600;cursor:pointer;">⬆ Raise draft MR</button>`;
    }
    btns += `<button onclick="rejectFix('${key}')" style="background:#fff;color:#bf2600;border:1px solid #bf2600;padding:6px 14px;border-radius:4px;font-size:13px;font-weight:600;cursor:pointer;">✗ Reject</button>`;
    h += `<div style="margin-top:10px;display:flex;gap:10px;">${btns}</div>`;
  }
  h += `<div style="font-size:11px;color:#8993a4;margin-top:6px;">review the diff, then raise the MR — nothing is pushed until you do</div>`;
  return h;
}

function renderFixSection(ticket) {
  return `<div style="margin-top:14px;">
    <button id="fixBtn" onclick="suggestFix('${ticket.key}')"
      style="background:#fff;border:1px solid #dfe1e6;color:#172b4d;padding:6px 14px;
      border-radius:4px;font-size:13px;font-weight:600;cursor:pointer;">${fixBtnLabel()}</button>
    <div id="fixResult" style="margin-top:10px;">${ticket.bot_fix_json ? renderFix(JSON.parse(ticket.bot_fix_json), ticket.key) : ''}</div>
  </div>`;
}

async function rejectFix(key) {
  try {
    const r = await fetch(`/api/tickets/${key}/reject_fix`, {method: 'POST'});
    if (!r.ok) {
      const d = await r.json().catch(() => ({}));
      showToast(d.detail || 'Reject failed', true);
      return;
    }
    const idx = tickets.findIndex(t => t.key === key);
    if (idx !== -1) tickets[idx].bot_fix_json = null;
    // Back to just the "Run dev agent" button (the suggestion is gone).
    const out = document.getElementById('fixResult');
    if (out) out.innerHTML = '';
    showToast('Fix suggestion discarded');
  } catch (e) {
    showToast(String(e), true);
  }
}

async function raiseMr(key) {
  const btn = document.getElementById('mrBtn');
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Raising draft MR…'; }
  try {
    const r = await fetch(`/api/tickets/${key}/raise_mr`, {method: 'POST'});
    const d = await r.json();
    if (!r.ok) {
      showToast(d.detail || 'Raise MR failed', true);
      if (btn) { btn.disabled = false; btn.textContent = '⬆ Raise draft MR'; }
      return;
    }
    const idx = tickets.findIndex(t => t.key === key);
    if (idx !== -1 && tickets[idx].bot_fix_json) {
      const fix = JSON.parse(tickets[idx].bot_fix_json); fix.mr = d;
      tickets[idx].bot_fix_json = JSON.stringify(fix);
      document.getElementById('fixResult').innerHTML = renderFix(fix, key);
    }
    showToast('Draft MR raised');
  } catch (e) {
    showToast(String(e), true);
    if (btn) { btn.disabled = false; btn.textContent = '⬆ Raise draft MR'; }
  }
}

function renderRcaContent(ticket) {
  if (ticket.bot_rca_json) {
    const v = JSON.parse(ticket.bot_rca_json);
    let html = '';
    // Disclaimer banner + the simple VERDICT call, shown first on every RCA.
    // Both are stored inside the RCA (schema.py to_dict); fall back to computing
    // them for older RCAs saved before that field existed.
    const disclaimer = v.disclaimer || 'Automated RCA — verify before acting';
    html += `<div style="font-size:11px;color:#8993a4;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:8px;">⚠ ${escHtml(disclaimer)}</div>`;
    const label = v.verdict_label || verdictLabel(v);
    const lc = VERDICT_COLORS[label] || VERDICT_COLORS['Needs review'];
    html += `<div style="margin-bottom:12px;">
      <span style="font-size:12px;font-weight:700;color:#5e6c84;">VERDICT: </span>
      <span style="display:inline-block;padding:2px 12px;border-radius:3px;font-size:13px;font-weight:700;background:${lc.bg};color:${lc.fg};">${label}</span>
    </div>`;
    if (v.headline) html += `<p style="font-weight:600;margin-bottom:6px;">${escHtml(v.headline)}</p>`;
    html += causeBadges(v);
    if (v.plain_summary) html += `<p style="margin-bottom:10px;">${escHtml(v.plain_summary)}</p>`;
    html += `<p style="color:#5e6c84;font-size:13px;">${escHtml(v.probable_root_cause)}</p>`;
    if (v.suggested_next_action) {
      html += `<p style="margin-top:10px;font-size:13px;"><strong>Next:</strong> ${escHtml(v.suggested_next_action)}</p>`;
    }
    if (v.evidence_chain && v.evidence_chain.length) {
      html += `<details style="margin-top:12px;"><summary style="cursor:pointer;font-size:13px;color:#0052cc;">Evidence trail (${v.evidence_chain.length} items)</summary><div style="margin-top:8px;">`;
      v.evidence_chain.forEach((e, i) => {
        html += `<div style="margin-bottom:8px;font-size:13px;">
          <strong>${i+1}. [${e.kind}]</strong> ${escHtml(e.detail)}<br>
          ${e.url ? `<a href="${e.url}" target="_blank" style="color:#0052cc;">${escHtml(e.ref)}</a>` : escHtml(e.ref)}
        </div>`;
      });
      html += '</div></details>';
    }
    // Fix Suggester is intentionally NOT shown on the Triage tab — it lives only on
    // the Dev Agent tab (selectTicket renders renderFixSection there).
    return html;
  }
  if (ticket.status === 'pending') {
    return `<div style="display:flex;flex-direction:column;gap:12px;align-items:flex-start;">
      <p class="rca-placeholder">RCA has not been run yet for this ticket.</p>
      <button class="run-btn" onclick="runRca('${ticket.key}')" id="runRcaBtn">
        <span>▶ Run RCA</span>
      </button>
    </div>`;
  }
  if (ticket.status === 'failed') {
    const reason = ticket.error
      ? escHtml(ticket.error)
      : 'RCA failed — check server logs.';
    return `<div style="border-left:3px solid #bf2600;background:#fff5f4;padding:10px 12px;border-radius:4px;">
        <p style="color:#bf2600;font-weight:600;margin:0 0 4px;">RCA failed</p>
        <p style="color:#5e6c84;font-size:13px;margin:0;">${reason}</p>
      </div>
      <button class="run-btn" onclick="runRca('${ticket.key}')" style="margin-top:10px;">Retry</button>`;
  }
  if (ticket.status === 'running') {
    return '<p style="color:#5e6c84;font-size:14px;font-style:italic;">⏳ Agent is investigating the codebase... this usually takes about 5–8 minutes (up to 10).</p>';
  }
  return '<p class="rca-placeholder">Running...</p>';
}

async function runRca(key) {
  const btn = document.getElementById('runRcaBtn');
  if (btn) {
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Investigating...';
  }
  document.getElementById('rcaContent').innerHTML =
    '<p style="color:#5e6c84;font-size:14px;font-style:italic;">⏳ Agent is investigating the codebase... this usually takes about 5–8 minutes (up to 10).</p>';
  try {
    const res = await fetch(`/api/tickets/${key}/rca`, {method:'POST'});
    if (!res.ok) throw new Error(await res.text());
    const idx = tickets.findIndex(t => t.key === key);
    if (idx !== -1) tickets[idx].status = 'running';
    setTimeout(() => pollRca(key), 5000);
  } catch(e) {
    document.getElementById('rcaContent').innerHTML =
      `<p style="color:#bf2600;">Failed: ${escHtml(String(e))}</p>
       <button class="run-btn" onclick="runRca('${key}')" style="margin-top:10px;">Retry</button>`;
  }
}

async function pollRca(key) {
  try {
    const res = await fetch(`/api/tickets/${key}/status`);
    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();
    const idx = tickets.findIndex(t => t.key === key);
    if (data.status === 'rca_ready') {
      if (idx !== -1) {
        tickets[idx].bot_rca_json = JSON.stringify(data.verdict);
        tickets[idx].status = 'rca_ready';
      }
      if (currentKey === key) { selectTicket(key); renderTicketList(); }
    } else if (data.status === 'failed') {
      if (idx !== -1) { tickets[idx].status = 'failed'; tickets[idx].error = data.error; }
      if (currentKey === key) selectTicket(key);
    } else {
      setTimeout(() => pollRca(key), 5000);
    }
  } catch(e) {
    setTimeout(() => pollRca(key), 5000);
  }
}

async function rerunRca(key) {
  const idx = tickets.findIndex(t => t.key === key);
  const st = idx !== -1 ? tickets[idx].status : '';
  // Re-running a ticket a human already decided on reopens it for review and
  // replaces the bot RCA. It does NOT undo anything already posted to Jira, so
  // make the reopen deliberate.
  if ((st === 'accepted' || st === 'rejected') &&
      !confirm('This ticket already has a human decision. Re-running generates a new RCA '
             + 'and reopens it for review — it does not change what was already posted to '
             + 'Jira. Continue?')) {
    return;
  }
  await fetch(`/api/tickets/${key}/reset`, {method:'POST'});
  if (idx !== -1) { tickets[idx].status = 'pending'; tickets[idx].bot_rca_json = null; }
  selectTicket(key);
  renderTicketList();
  await runRca(key);
}

async function acceptRca() {
  setActionBtns(true);
  try {
    const res = await fetch(`/api/tickets/${currentKey}/accept`, {method:'POST'});
    if (!res.ok) throw new Error(await res.text());
    const idx = tickets.findIndex(t => t.key === currentKey);
    if (idx !== -1) tickets[idx].status = 'accepted';
    showToast('✓ Accepted');
    selectTicket(currentKey);
    renderTicketList();
    loadScoreboard();
  } catch(e) {
    showToast('Error: ' + e.message, true);
    setActionBtns(false);
  }
}

async function acceptAndPostRca() {
  setActionBtns(true);
  try {
    const res = await fetch(`/api/tickets/${currentKey}/accept_and_post`, {method:'POST'});
    if (!res.ok) throw new Error(await res.text());
    const idx = tickets.findIndex(t => t.key === currentKey);
    if (idx !== -1) tickets[idx].status = 'accepted';
    showToast('✓ RCA posted to Jira');
    selectTicket(currentKey);
    renderTicketList();
    loadScoreboard();
  } catch(e) {
    showToast('Error: ' + e.message, true);
    setActionBtns(false);
  }
}

function showHumanRca() {
  document.getElementById('humanRcaBox').classList.add('show');
  document.getElementById('humanRcaText').focus();
}

async function postHumanRca() {
  const text = document.getElementById('humanRcaText').value.trim();
  if (!text) { showToast('Please write your RCA first', true); return; }
  try {
    const res = await fetch(`/api/tickets/${currentKey}/reject`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({human_rca: text})
    });
    if (!res.ok) throw new Error(await res.text());
    const idx = tickets.findIndex(t => t.key === currentKey);
    if (idx !== -1) { tickets[idx].status = 'rejected'; tickets[idx].human_rca = text; }
    showToast('Human RCA posted to Jira');
    selectTicket(currentKey);
    renderTicketList();
    loadScoreboard();
  } catch(e) {
    showToast('Error: ' + e.message, true);
  }
}

async function loadScoreboard() {
  /* The acceptance scoreboard has moved to the Quality tab (/api/quality). */
}

function setActionBtns(disabled) {
  ['acceptBtn', 'acceptPostBtn', 'rejectBtn'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.disabled = disabled;
  });
}

function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = isError ? '#bf2600' : '#172b4d';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Restore the saved filters across refreshes; on a first visit, default the date
// range to the last 7 days so the first load is scoped, not "every AUT bug ever".
(function initDateRange() {
  const fmt = d => d.toISOString().slice(0, 10);
  const today = new Date();
  const weekAgo = new Date();
  weekAgo.setDate(today.getDate() - 7);
  let savedFrom, savedTo, savedIncl, savedWorkType;
  try {
    savedFrom = localStorage.getItem('triage.fromDate');
    savedTo = localStorage.getItem('triage.toDate');
    savedIncl = localStorage.getItem('triage.includeResolved');
    savedWorkType = localStorage.getItem('triage.workType');
  } catch (e) {}
  document.getElementById('fromDate').value = savedFrom || fmt(weekAgo);
  // Don't let a stale saved 'To' date (e.g. yesterday's) silently hide tickets
  // created today — bump it up to today if it's in the past.
  const todayStr = fmt(today);
  let toVal = savedTo || todayStr;
  if (toVal < todayStr) toVal = todayStr;
  document.getElementById('toDate').value = toVal;
  document.getElementById('includeResolved').checked = savedIncl === 'true';
  if (savedWorkType) document.getElementById('workType').value = savedWorkType;
})();

styleTabs();
loadTickets();
</script>
